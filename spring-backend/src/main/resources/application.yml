spring:
  application:
    name: RagBackend

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/rag_db}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH_CLIENT_ID:google-client-id}
            client-secret: ${OAUTH_CLIENT_SECRET:google-client-secret}
            scope:
              - email
              - profile

jwt:
  secret: ${JWT_SECRET:a-very-secure-secret-key-that-is-at-least-256-bits-long-for-hmac-sha-256}
  access-token-expiration-ms: 900000 # 15 minutes
  refresh-token-expiration-ms: 691200000 # 8 days

python:
  service:
    url: ${PYTHON_SERVICE_URL:http://localhost:8000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.rag.backend: DEBUG
    org.springframework.security: DEBUG
